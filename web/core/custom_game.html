        <h1>JS Sandbox: Napiš vlastní hru</h1>
        <p>Využij API <code>GameConvert</code> a napiš si vlastní pravidla (např. hru NIM). Pro vyhodnocení musí tvůj skript vracet instanci <code>Game</code>.</p>
        
        <textarea id="code-editor" style="width: 100%; height: 400px;">
// Příklad: Hra NIM (odebírání zápalek)
class Nim extends GameConvert {
    constructor() { super({ useC: false }); }

    // rawGame je pocet sirek na hromádce
    independentComponents(rawGame, position) { return [rawGame]; }
    numMoves(rawGame, position) { return rawGame; }
    
    // Obě strany mohou odebrat stejný počet sirek
    canLeftMove(rawGame, position, move) { return true; }
    canRightMove(rawGame, position, move) { return true; }
    
    // "move" je index tahu (0 az rawGame-1). Počet odebraných sirek = move + 1.
    doMoveLeft(rawGame, position, move) { return rawGame - (move + 1); }
    doMoveRight(rawGame, position, move) { return rawGame - (move + 1); }
    
    hashRawGamePosition(rawGame, position, move) { return rawGame ^ move; }
}

const nim = new Nim();
// Spustíme konverzi pro hromádku o velikosti 4
return nim.convert(4, null);
